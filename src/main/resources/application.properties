# ── Server ──
server.port=8080
# ── PostgreSQL ──
spring.datasource.url=jdbc:postgresql://localhost:5432/freightops
spring.datasource.username=freight
spring.datasource.password=freight
# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
# ── SQL seed data ──
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
# ── Jackson ──
spring.jackson.serialization.write-dates-as-timestamps=false
# SpringDoc — disable pageable converter so sort renders as plain string, not array
springdoc.model-converters.pageable-customizer.enabled=false
# Booking settings
app.booking.auto-cutoff-percent=95
# AI
app.ai.provider=noop
app.ai.api-key=${AI_API_KEY}
app.ai.model=claude-sonnet-4-20250514
app.ai.max-tokens=1024
app.ai.base-url=https://api.anthropic.com
app.ai.connect-timeout=30
app.ai.anthropic-version=2023-06-01
app.ai.test.enabled=true
# Base url
app.base-url=http://localhost:8080
# News provider
app.news.provider=static
app.news.feeds=https://gcaptain.com/feed/,https://theloadstar.com/feed/
app.news.max-headlines=5
app.news.connect-timeout=10
app.news.read-timeout=30
# Email
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
# Email service
app.email.enabled=true
app.email.from-address=noreply@apgl-shipping.com
app.email.reply-to=support@apgl-shipping.com
